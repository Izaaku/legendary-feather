<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>{{ doc_title }} — Legendary Feather</title>
<link rel="icon" href="/static/favicon.ico">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #151520;
    --text: #f0f0f5;
    --text-sub: #a0a0b0;
    --text-muted: #6b6b80;
    --gold: #d4a843;
    --gold-dim: rgba(212,168,67,0.1);
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
  }
  .topbar {
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar a.brand {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--gold);
    text-decoration: none;
    letter-spacing: 0.5px;
  }
  .topbar nav a {
    color: var(--text-sub);
    text-decoration: none;
    margin-left: 24px;
    font-size: 13px;
    transition: color 0.2s;
  }
  .topbar nav a:hover { color: var(--gold); }
  main {
    max-width: 820px;
    margin: 0 auto;
    padding: 60px 32px 100px;
  }
  h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 42px;
    font-weight: 400;
    margin-bottom: 8px;
    color: var(--text);
  }
  .effective {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  h2 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 26px;
    font-weight: 500;
    color: var(--gold);
    margin-top: 40px;
    margin-bottom: 16px;
  }
  h3 {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    margin-top: 24px;
    margin-bottom: 10px;
  }
  p { margin-bottom: 14px; color: var(--text-sub); font-size: 15px; }
  ul, ol { margin: 12px 0 14px 24px; }
  li { margin-bottom: 8px; color: var(--text-sub); font-size: 15px; }
  strong { color: var(--text); font-weight: 600; }
  a { color: var(--gold); }
  code {
    background: var(--gold-dim);
    color: var(--gold);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    font-family: 'SF Mono', Monaco, monospace;
  }
  .callout {
    background: var(--gold-dim);
    border: 1px solid rgba(212,168,67,0.25);
    border-radius: 8px;
    padding: 16px 20px;
    margin: 20px 0;
    font-size: 14px;
    color: var(--text);
  }
  .callout strong { color: var(--gold); }
  footer {
    border-top: 1px solid var(--border);
    padding: 24px 32px;
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
  }
  footer a { margin: 0 12px; color: var(--text-muted); text-decoration: none; }
  footer a:hover { color: var(--gold); }
</style>
</head>
<body>
<header class="topbar">
  <a href="/" class="brand">Legendary Feather</a>
  <nav>
    <a href="/pricing">Pricing</a>
    <a href="/auth">Sign in</a>
  </nav>
</header>
<main>
  <h1>{{ doc_title }}</h1>
  <div class="effective">Effective date: {{ effective_date }} &middot; Last updated: {{ updated_date }}</div>
  {% block content %}{% endblock %}
</main>
<footer>
  &copy; {{ year }} Isaak Uribe — Legendary Feather. All rights reserved.
  <br>
  <a href="/privacy">Privacy</a> &middot;
  <a href="/terms">Terms</a> &middot;
  <a href="/refund">Refunds</a> &middot;
  <a href="mailto:legal@legendaryfeather.com">legal@legendaryfeather.com</a>
</footer>
</body>
</html>
