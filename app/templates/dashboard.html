<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legendary Feather — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #D4A843;
  --gold-l: #EEC96A;
  --gold-ll: #F7DFA0;
  --gold-dim: rgba(212,168,67,0.15);
  --gold-glow: rgba(212,168,67,0.35);
  --bg: #000000;
  --bg2: #0A0A0A;
  --bg3: #111111;
  --text: #EAE4D8;
  --text-sub: #7A9AB5;
  --text-muted: #3A5A70;
  --border: rgba(212,168,67,0.2);
  --border-bright: rgba(212,168,67,0.5);
  --green: #4ADE80;
  --red: #F87171;
  --blue: #60A5FA;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── TOP BAR ── */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 20px;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}
.top-bar-logo {
  display: flex; align-items: center; gap: 8px;
  text-decoration: none;
}
.top-bar-logo svg { width: 22px; height: 22px; }
.top-bar-logo span {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px; font-weight: 600; color: var(--gold);
  letter-spacing: 1px;
}
.top-bar-right {
  display: flex; align-items: center; gap: 12px;
}
.top-bar-user {
  font-size: 12px; color: var(--text-sub);
}
.top-bar-user strong { color: var(--text); font-weight: 500; }
.btn-logout {
  padding: 6px 16px; border-radius: 20px;
  font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 500;
  background: transparent; color: var(--text-muted);
  border: 1px solid var(--border); cursor: pointer;
  transition: all 0.3s;
}
.btn-logout:hover {
  border-color: var(--red); color: var(--red);
  background: rgba(248,113,113,0.1);
}

/* ── PLAN SWITCHER (demo only, hidden when session active) ── */
.plan-switcher {
  position: fixed; top: 46px; left: 0; right: 0; z-index: 199;
  display: none; justify-content: center; gap: 8px;
  padding: 8px 20px;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}
.plan-switcher.visible { display: flex; }
.plan-switcher button {
  font-family: 'Outfit', sans-serif;
  padding: 6px 18px; border-radius: 40px;
  font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.3s;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-sub);
}
.plan-switcher button.active {
  background: linear-gradient(135deg, var(--gold), var(--gold-l));
  color: var(--bg); border-color: var(--gold);
}
.plan-switcher button:hover:not(.active) {
  border-color: var(--border-bright); color: var(--gold);
}

/* ── SIDEBAR ── */
.layout { display: flex; min-height: 100vh; padding-top: 46px; }
.layout.with-switcher { padding-top: 82px; }

.sidebar {
  width: 260px; min-height: 100%;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 32px 20px;
  display: flex; flex-direction: column; gap: 8px;
  position: fixed; top: 46px; bottom: 0; left: 0;
  overflow-y: auto;
}

.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 32px; text-decoration: none;
}
.sidebar-logo-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-weight: 600; color: var(--gold);
  letter-spacing: 0.5px;
}
.sidebar-logo img { width: 18px; height: auto; filter: drop-shadow(0 0 6px rgba(212,168,67,0.4)); }

.sidebar-section {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-muted); margin: 16px 0 8px; padding-left: 12px;
}

.sidebar-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px;
  font-size: 13px; color: var(--text-sub);
  cursor: pointer; transition: all 0.2s;
  text-decoration: none;
}
.sidebar-item:hover { background: var(--gold-dim); color: var(--text); }
.sidebar-item.active { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--border); }
.sidebar-item svg { width: 18px; height: 18px; opacity: 0.6; }
.sidebar-item.active svg { opacity: 1; }

.sidebar-badge {
  margin-left: auto;
  font-size: 10px; font-weight: 600;
  background: var(--gold); color: var(--bg);
  padding: 2px 8px; border-radius: 10px;
}

.sidebar-plan {
  margin-top: auto;
  padding: 16px;
  background: linear-gradient(145deg, var(--bg3), var(--bg2));
  border: 1px solid var(--border);
  border-radius: 14px;
}
.sidebar-plan-name {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 6px;
}
.sidebar-plan-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 400; color: var(--text);
}
.sidebar-plan-price {
  font-size: 12px; color: var(--text-muted); margin-bottom: 12px;
}
.sidebar-upgrade {
  display: block; width: 100%; text-align: center;
  padding: 8px; border-radius: 8px;
  font-size: 12px; font-weight: 500;
  background: linear-gradient(135deg, var(--gold), var(--gold-l));
  color: var(--bg); border: none; cursor: pointer;
  transition: all 0.3s;
}
.sidebar-upgrade:hover { box-shadow: 0 0 20px var(--gold-glow); }

/* ── MAIN ── */
.main { flex: 1; margin-left: 260px; padding: 32px 40px; }

.main-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 32px;
}
.main-greeting {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px; font-weight: 300;
}
.main-greeting em { font-style: italic; color: var(--gold); }

.main-date { font-size: 13px; color: var(--text-muted); }

.user-badge {
  display: flex; align-items: center; gap: 10px;
}
.user-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--gold-dim); border: 1px solid var(--border-bright);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; color: var(--gold);
}
.user-name { font-size: 13px; color: var(--text-sub); }
.user-plan-tag {
  font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
  padding: 2px 8px; border-radius: 6px;
  background: var(--gold-dim); color: var(--gold); border: 1px solid var(--border);
}

/* ── STATS CARDS ── */
.stats-row {
  display: grid; gap: 16px; margin-bottom: 32px;
}
.stats-row.cols-3 { grid-template-columns: repeat(3, 1fr); }
.stats-row.cols-4 { grid-template-columns: repeat(4, 1fr); }

.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  position: relative; overflow: hidden;
  transition: border-color 0.3s, transform 0.3s;
}
.stat-card:hover { border-color: var(--border-bright); transform: translateY(-2px); }
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.stat-card:hover::before { opacity: 1; }

.stat-label {
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 12px;
}
.stat-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px; font-weight: 300; color: var(--text);
  line-height: 1;
}
.stat-value span { font-size: 18px; color: var(--text-sub); }
.stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 8px; }
.stat-icon {
  position: absolute; top: 20px; right: 20px;
  width: 40px; height: 40px; border-radius: 12px;
  background: var(--gold-dim); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
}

/* ── PROGRESS RING ── */
.credit-ring {
  width: 100%; display: flex; flex-direction: column; align-items: center;
  padding: 20px 0;
}
.credit-ring svg { width: 140px; height: 140px; transform: rotate(-90deg); }
.credit-ring circle {
  fill: none; stroke-width: 8; stroke-linecap: round;
}
.credit-ring .ring-bg { stroke: var(--bg3); }
.credit-ring .ring-fill { stroke: var(--gold); transition: stroke-dashoffset 1s ease; }
.credit-ring .ring-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px; fill: var(--text); text-anchor: middle;
  dominant-baseline: middle; transform: rotate(90deg); transform-origin: center;
}
.credit-ring .ring-label {
  font-size: 10px; fill: var(--text-muted); text-anchor: middle;
  dominant-baseline: middle; transform: rotate(90deg); transform-origin: center;
}

/* ── CARDS / SECTIONS ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 20px;
}
.card-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px;
}
.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 400;
}
.card-title em { font-style: italic; color: var(--gold); }
.card-action {
  font-size: 12px; color: var(--gold); cursor: pointer;
  text-decoration: none; transition: color 0.2s;
}
.card-action:hover { color: var(--gold-l); }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }

/* ── USAGE BAR ── */
.usage-bar-container { margin-bottom: 20px; }
.usage-bar-header {
  display: flex; justify-content: space-between; margin-bottom: 8px;
}
.usage-bar-label { font-size: 12px; color: var(--text-sub); }
.usage-bar-value { font-size: 12px; color: var(--gold); font-weight: 500; }
.usage-bar {
  height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden;
}
.usage-bar-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--gold), var(--gold-l));
  transition: width 1s ease;
}

/* ── ACTIVITY / LIST ── */
.activity-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.activity-item:last-child { border-bottom: none; }
.activity-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold); flex-shrink: 0;
}
.activity-dot.green { background: var(--green); }
.activity-dot.blue { background: var(--blue); }
.activity-text { font-size: 13px; color: var(--text-sub); flex: 1; }
.activity-text strong { color: var(--text); font-weight: 500; }
.activity-time { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

/* ── LANGUAGE CHIPS ── */
.lang-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.lang-chip {
  padding: 6px 14px; border-radius: 20px; font-size: 12px;
  background: var(--gold-dim); border: 1px solid var(--border);
  color: var(--text-sub); transition: all 0.2s;
}
.lang-chip:hover { border-color: var(--border-bright); color: var(--gold); }
.lang-chip.active { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: 500; }

/* ── VOICE PROFILES ── */
.voice-profile {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px; border-radius: 12px;
  background: var(--bg3); border: 1px solid var(--border);
  margin-bottom: 10px; transition: all 0.2s;
}
.voice-profile:hover { border-color: var(--border-bright); }
.voice-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--gold-dim); border: 1px solid var(--border-bright);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--gold);
}
.voice-info { flex: 1; }
.voice-name { font-size: 13px; color: var(--text); font-weight: 500; }
.voice-lang { font-size: 11px; color: var(--text-muted); }
.voice-action {
  padding: 5px 12px; border-radius: 6px; font-size: 11px;
  background: var(--gold-dim); border: 1px solid var(--border);
  color: var(--gold); cursor: pointer; transition: all 0.2s;
}
.voice-action:hover { background: var(--gold); color: var(--bg); }

/* ── MEETING LOG (Business) ── */
.meeting-item {
  padding: 16px; border-radius: 12px;
  background: var(--bg3); border: 1px solid var(--border);
  margin-bottom: 10px; transition: all 0.2s; cursor: pointer;
}
.meeting-item:hover { border-color: var(--border-bright); }
.meeting-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.meeting-title { font-size: 14px; color: var(--text); font-weight: 500; }
.meeting-date { font-size: 11px; color: var(--text-muted); }
.meeting-meta { display: flex; gap: 16px; }
.meeting-meta-item { font-size: 11px; color: var(--text-sub); display: flex; align-items: center; gap: 4px; }
.meeting-summary { font-size: 12px; color: var(--text-muted); margin-top: 8px; line-height: 1.6; }

/* ── TEAM MEMBER ── */
.team-member {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; border-radius: 10px;
  background: var(--bg3); border: 1px solid var(--border);
  margin-bottom: 8px;
}
.team-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--gold-dim); border: 1px solid var(--border-bright);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: var(--gold); font-weight: 600;
}
.team-info { flex: 1; }
.team-name { font-size: 13px; color: var(--text); }
.team-role { font-size: 11px; color: var(--text-muted); }
.team-minutes { font-size: 12px; color: var(--gold); font-weight: 500; }
.team-status {
  width: 8px; height: 8px; border-radius: 50%; background: var(--green);
}

/* ── QUICK ACTION BUTTONS ── */
.quick-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.quick-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 18px; border-radius: 10px;
  font-size: 12px; font-weight: 500;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text-sub); cursor: pointer; transition: all 0.2s;
}
.quick-btn:hover { border-color: var(--border-bright); color: var(--gold); }
.quick-btn.primary {
  background: linear-gradient(135deg, var(--gold), var(--gold-l));
  color: var(--bg); border-color: var(--gold);
}
.quick-btn.primary:hover { box-shadow: 0 0 20px var(--gold-glow); }

/* ── FEATURE LOCKED ── */
.locked-overlay {
  position: relative; opacity: 0.4; pointer-events: none;
}
.locked-badge {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: var(--bg2); border: 1px solid var(--border-bright);
  padding: 8px 20px; border-radius: 10px; z-index: 10;
  font-size: 12px; color: var(--gold); font-weight: 500;
  pointer-events: all; cursor: pointer;
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .main { margin-left: 0; padding: 20px; }
  .stats-row.cols-3, .stats-row.cols-4 { grid-template-columns: 1fr 1fr; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
}

/* ── ANIMATIONS ── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-in { animation: fadeIn 0.5s ease forwards; }
.delay-1 { animation-delay: 0.1s; opacity: 0; }
.delay-2 { animation-delay: 0.2s; opacity: 0; }
.delay-3 { animation-delay: 0.3s; opacity: 0; }
.delay-4 { animation-delay: 0.4s; opacity: 0; }


/* ── STAR CANVAS (golden dots) ── */
#starCanvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── GOLDEN SHINE HOVER ON CARDS ── */
@keyframes shineGlow {
  0% { box-shadow: 0 0 0 0 transparent; border-color: var(--border); }
  50% { box-shadow: 0 0 18px rgba(212,168,67,0.25), inset 0 0 8px rgba(212,168,67,0.05); border-color: var(--gold); }
  100% { box-shadow: 0 0 0 0 transparent; border-color: var(--border-bright); }
}
.stat-card:hover, .card:hover {
  border-color: var(--gold) !important;
  box-shadow: 0 0 20px rgba(212,168,67,0.2), 0 0 40px rgba(212,168,67,0.08);
  transition: border-color 0.3s, box-shadow 0.4s;
}
.sidebar-item:hover {
  box-shadow: 0 0 12px rgba(212,168,67,0.15);
}

/* ── HAMBURGER MENU (mobile) ── */
.hamburger-btn {
  display: none;
  position: fixed; top: 8px; left: 12px; z-index: 250;
  width: 36px; height: 36px; border-radius: 8px;
  background: rgba(0,0,0,0.8); border: 1px solid var(--border);
  color: var(--gold); cursor: pointer;
  align-items: center; justify-content: center;
  transition: all 0.2s;
}
.hamburger-btn:hover { border-color: var(--gold); background: var(--gold-dim); }
.hamburger-btn svg { width: 18px; height: 18px; }

.sidebar-overlay {
  display: none; position: fixed; inset: 0; z-index: 198;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
}
.sidebar-overlay.open { display: block; }

@media (max-width: 900px) {
  .hamburger-btn { display: flex; }
  .sidebar {
    display: flex !important;
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 199;
    background: rgba(10,10,10,0.98);
    backdrop-filter: blur(10px);
  }
  .sidebar.mobile-open {
    transform: translateX(0);
  }
  .top-bar-logo span { font-size: 12px; }
  .top-bar { padding-left: 52px; }
}
</style>
</head>
<body>
<canvas id="starCanvas"></canvas>

<!-- HAMBURGER MENU BUTTON (mobile) -->
<button class="hamburger-btn" id="hamburgerBtn" onclick="toggleSidebar()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- TOP BAR -->

<script>
// ═══════════════════════════════════════════════════════════════════
// LF_I18N — client-side translation helper
// ═══════════════════════════════════════════════════════════════════
// All UI text is authored in English. When a customer picks a non-English
// language during onboarding, we translate strings on demand via DeepL and
// cache them aggressively in localStorage so the second page load is free.
// Pages that want translation call lf_translateNode(rootEl) — every text
// node and placeholder gets walked, sent in a batch to /api/translate, and
// swapped in place. Same preferred_source_lang drives the support chat so
// the agent already knows what language to reply in.
// ═══════════════════════════════════════════════════════════════════

const _LF_I18N = {
  lang: null,
  cache: {}, // text → translated
  inflight: new Map(), // text → Promise (dedupe concurrent requests)
};

function _lfGetUserLang() {
  try {
    const sess = JSON.parse(sessionStorage.getItem('lf_session') || '{}');
    if (sess.preferred_source_lang) return sess.preferred_source_lang.toLowerCase().slice(0,2);
  } catch (e) {}
  return 'en';
}

function _lfLoadCache(lang) {
  if (lang === 'en') { _LF_I18N.cache = {}; return; }
  try {
    _LF_I18N.cache = JSON.parse(localStorage.getItem('lf_i18n_' + lang) || '{}');
  } catch (e) { _LF_I18N.cache = {}; }
}

function _lfSaveCache(lang) {
  if (lang === 'en') return;
  try {
    localStorage.setItem('lf_i18n_' + lang, JSON.stringify(_LF_I18N.cache));
  } catch (e) {}
}

async function _lfTranslateBatch(texts, lang) {
  // Skip empty / numeric / already-translated strings
  const todo = [...new Set(texts)].filter(t => t && t.trim() && !_LF_I18N.cache[t] && !/^[\d\s\W]+$/.test(t));
  if (!todo.length) return;
  const token = sessionStorage.getItem('lf_token');

  // ONE HTTP request via /api/translate-batch (much friendlier to the WAF
  // / rate limiter than firing 50 parallel /api/translate calls).
  // Cap at 200 strings per batch (server limit). For larger pages we slice.
  const CHUNK = 100;
  for (let i = 0; i < todo.length; i += CHUNK) {
    const slice = todo.slice(i, i + CHUNK);
    try {
      const r = await fetch('/api/translate-batch', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ texts: slice, source_lang: 'en', target_lang: lang })
      });
      if (!r.ok) {
        // 403 (WAF) / 429 (rate limit) / 5xx — back off and skip this batch
        // silently. The page stays in English, much better UX than a broken
        // page or a flood of errors. Next page-load will retry from cache.
        console.warn('[i18n] Translate batch failed:', r.status);
        continue;
      }
      const data = await r.json();
      if (data && Array.isArray(data.translations)) {
        slice.forEach((src, idx) => {
          const tr = data.translations[idx];
          if (tr && tr !== src) _LF_I18N.cache[src] = tr;
        });
      }
    } catch (e) {
      console.warn('[i18n] Translate batch error:', e);
    }
  }
  _lfSaveCache(lang);
}

// Translate every text node and common placeholder/title attributes in `root`.
// The DOM mutation is done in two passes: first collect strings (sync), then
// replace once translations come back (async).
async function lf_translateNode(root) {
  const lang = _lfGetUserLang();
  if (!lang || lang === 'en') return; // English is the source language
  if (lang !== _LF_I18N.lang) {
    _LF_I18N.lang = lang;
    _lfLoadCache(lang);
  }
  if (!root) root = document.body;

  // Collect text nodes (skip script/style/code; skip already-Spanish via re-walk dedup)
  const SKIP_TAGS = new Set(['SCRIPT','STYLE','CODE','PRE','TEXTAREA','INPUT']);
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(n) {
      if (!n.nodeValue || !n.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
      if (n.parentElement && SKIP_TAGS.has(n.parentElement.tagName)) return NodeFilter.FILTER_REJECT;
      if (n.parentElement && n.parentElement.dataset && n.parentElement.dataset.noI18n === '1') return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const textNodes = [];
  let n;
  while ((n = walker.nextNode())) textNodes.push(n);
  const placeholderEls = root.querySelectorAll('[placeholder]');
  const titleEls = root.querySelectorAll('[title]');

  const allStrings = [
    ...textNodes.map(n => n.nodeValue.trim()),
    ...Array.from(placeholderEls).map(e => e.getAttribute('placeholder') || ''),
    ...Array.from(titleEls).map(e => e.getAttribute('title') || ''),
  ];

  await _lfTranslateBatch(allStrings, lang);

  // Apply translations
  for (const tn of textNodes) {
    const orig = tn.nodeValue.trim();
    const tr = _LF_I18N.cache[orig];
    if (tr) tn.nodeValue = tn.nodeValue.replace(orig, tr);
  }
  for (const el of placeholderEls) {
    const orig = el.getAttribute('placeholder');
    if (orig && _LF_I18N.cache[orig]) el.setAttribute('placeholder', _LF_I18N.cache[orig]);
  }
  for (const el of titleEls) {

async function _lfPickLanguage(code) {
  const overlay = document.getElementById('lf-lang-onboard');
  if (overlay) overlay.remove();

  // Persist on the server (so dashboard + support agree across devices)
  try {
    await fetch('/api/auth/me', {
      method: 'PATCH',
      headers: { 'Authorization': 'Bearer ' + sessionStorage.getItem('lf_token'), 'Content-Type': 'application/json' },
      body: JSON.stringify({ preferred_source_lang: code })
    });
  } catch (e) {}

  // Update the local session so subsequent renders pick the new lang
  try {
    const sess = JSON.parse(sessionStorage.getItem('lf_session') || '{}');
    sess.preferred_source_lang = code;
    sess.lang_picked = true;
    sessionStorage.setItem('lf_session', JSON.stringify(sess));
    if (sess.user_id) localStorage.setItem('lf_lang_picked_' + sess.user_id, '1');
  } catch (e) {}

  // Translate the page now
  if (code !== 'en') {
    await lf_translateNode(document.body);
  } else {
    // No-op for English; flag prevents the modal from re-appearing
  }
}

// Run language onboarding + auto-translate AFTER the dashboard has fetched
// the session and rendered itself. We use `load` so animations and initial
// fetches don't block the modal.
window.addEventListener('load', () => {
  setTimeout(() => {
    _lfShowLanguageOnboarding();
    // If lang is already picked, translate the current view
    if (_lfGetUserLang() !== 'en') {
      lf_translateNode(document.body);
    }
  }, 600);  // tiny delay so the welcome header animation finishes first
});

// Re-translate when navigation changes the main content (sidebar clicks).
// MutationObserver watches the main panel and re-runs translation on swap.
(function _lfWatchMain() {
  const main = document.getElementById('main-content');
  if (!main) return;
  const obs = new MutationObserver(() => {
    if (_lfGetUserLang() !== 'en') {
      // Debounce — wait for the inner HTML to settle before walking
      clearTimeout(window._lfRetranslateTimer);
      window._lfRetranslateTimer = setTimeout(() => lf_translateNode(main), 80);
    }
  });
  // Wait for the element to exist
  const tryAttach = () => {
    const m = document.getElementById('main-content');
    if (m) obs.observe(m, { childList: true, subtree: true, characterData: false });
    else setTimeout(tryAttach, 200);
  };
  tryAttach();
})();

function _lfFormatRelTime(iso) {
  if (!iso) return '';
  try {
    const t = new Date(iso).getTime();
    const diffSec = Math.max(0, Math.floor((Date.now() - t) / 1000));
    if (diffSec < 60) return 'Just now';
    if (diffSec < 3600) return Math.floor(diffSec / 60) + 'm ago';
    if (diffSec < 86400) return Math.floor(diffSec / 3600) + 'h ago';
    if (diffSec < 86400 * 7) return Math.floor(diffSec / 86400) + 'd ago';
    return new Date(iso).toLocaleDateString();
  } catch (e) { return ''; }
}

// Pull live stats from /api/dashboard/stats and re-render the current view.
async function loadDashboardStats() {
  const token = sessionStorage.getItem('lf_token');
  if (!token) return;
  try {
    const r = await fetch('/api/dashboard/stats', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!r.ok) return;
    dashboardStats = await r.json();

    // Keep currentSession's minutes_used/total in sync so other views
    // (Settings, sidebar) reflect the latest numbers without another fetch.
    if (currentSession && dashboardStats) {
      currentSession.minutes_used = dashboardStats.minutes_used;
      currentSession.minutes_total = dashboardStats.minutes_total;
      try { sessionStorage.setItem('lf_session', JSON.stringify(currentSession)); } catch(e) {}
    }

    // Re-render the dashboard with fresh data
    if (currentSession) {
      showPlan(mapPlanToMockKey(currentSession.plan || 'free'));
    }
  } catch (e) {
    // Silent — empty states are already rendered, no need to alarm the user.
  }
}

function showPlan(planKey) {
  // Defensive: ensure planKey resolves to a valid mockup entry. If a caller
  // passes a real plan slug like 'free', map it to 'personal'.
  const resolvedKey = plans[planKey] ? planKey : mapPlanToMockKey(planKey);
  const plan = plans[resolvedKey] || plans.personal;

  // Hydrate `plan` with real values from /api/dashboard/stats so the dashboard
  // never shows mock numbers. Fall back to currentSession (which has at least
  // minutes_used/total from /auth/login) and finally to the template defaults.
  if (dashboardStats) {
    plan.used = dashboardStats.minutes_used || 0;
    if (typeof dashboardStats.minutes_total === 'number') plan.minutes = dashboardStats.minutes_total;
    plan.history = (dashboardStats.recent || []).map(r => {
      const src = (r.source_lang || '').toUpperCase();
      const tgt = (r.target_lang || '').toUpperCase();
      const dur = r.duration_minutes ? ` &middot; ${r.duration_minutes} min` : '';
      const time = _lfFormatRelTime(r.started_at);
      return {
        text: `<strong>${src} → ${tgt}</strong> ${r.mode === 'face_to_face' ? 'Face-to-Face' : 'Conference'}${dur}`,
        time: time,
        dot: r.status === 'completed' ? 'green' : (r.status === 'active' ? '' : 'blue')

    plan.topLangs = (dashboardStats.top_langs || []);

async function changeDisplayLanguage() {
  const sel = document.getElementById('settingsLangSelect');
  const newLang = (sel && sel.value) || 'en';
  const msg = document.getElementById('langMsg');
  try {
    // Persist to backend (same field the support agent reads)
    const r = await fetch('/api/auth/me', {
      method: 'PATCH',
      headers: { 'Authorization': 'Bearer ' + sessionStorage.getItem('lf_token'), 'Content-Type': 'application/json' },
      body: JSON.stringify({ preferred_source_lang: newLang })
    });
    if (!r.ok) throw new Error('Server returned ' + r.status);

    // Update local session so the i18n helper picks it up
    try {
      const sess = JSON.parse(sessionStorage.getItem('lf_session') || '{}');
      sess.preferred_source_lang = newLang;
      sess.lang_picked = true;
      sessionStorage.setItem('lf_session', JSON.stringify(sess));
      if (sess.user_id) localStorage.setItem('lf_lang_picked_' + sess.user_id, '1');
    } catch (e) {}

    // Reset i18n cache for the previous lang flag and reload page so EVERY
    // string re-translates with the new target. Cleanest UX, ~1s reload.
    if (msg) { msg.style.color = 'var(--green)'; msg.textContent = '✓ Language updated. Reloading…'; }
    setTimeout(() => window.location.reload(), 800);
  } catch (e) {
    if (msg) { msg.style.color = 'var(--red)'; msg.textContent = 'Could not save: ' + e.message; }
  }
}

async function changePassword() {
  const current = document.getElementById('currentPw').value;
  const newPw = document.getElementById('newPw').value;
  const msg = document.getElementById('pwMsg');
  try {
    const res = await authFetch('/api/auth/change-password', {
      method: 'POST', body: JSON.stringify({ current_password: current, new_password: newPw })
    });
    const data = await res.json();
    if (res.ok) { msg.style.color = 'var(--green)'; msg.textContent = 'Password updated!'; }
    else { msg.style.color = 'var(--red)'; msg.textContent = data.error; }
  } catch { msg.style.color = 'var(--red)'; msg.textContent = 'Failed to update password.'; }
}

async function initSupportChat() {
  const token = sessionStorage.getItem('lf_token');
  const user = JSON.parse(sessionStorage.getItem('lf_session') || '{}');
  if (!token) return;

  // Get or create conversation
  try {
    const resp = await fetch('/api/support/conversations/mine', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const convs = await resp.json();
    const openConv = convs.find(c => c.status === 'open' || c.status === 'assigned');

    if (openConv) {
      currentConvId = openConv.id;
    } else {
      // Create new conversation
      const newResp = await fetch('/api/support/conversations', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ subject: 'Support request', user_name: user.name || user.email })
      });
      const newConv = await newResp.json();
      currentConvId = newConv.id;
    }

    // Load messages
    const msgResp = await fetch('/api/support/conversations/' + currentConvId + '/messages', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const messages = await msgResp.json();
    renderChatMessages(messages);
    _supportLastMsgCount = Array.isArray(messages) ? messages.length : 0;
    startSupportPolling();

    // Optional WebSocket — only if socket.io is loaded on the page (it isn\'t
    // on /dashboard, so this block is a no-op there. Kept for future).
    if (typeof io !== 'undefined') {
      if (!supportSocket) supportSocket = io();
      supportSocket.emit('join_chat', { conversation_id: currentConvId });
      supportSocket.on('new_message', (data) => {
        if (data.conversation_id === currentConvId && data.sender_type !== 'customer') {
          appendChatMessage(data);
        }
      });
      supportSocket.on('user_typing', (data) => {
        if (data.conversation_id === currentConvId) {
          const ti = document.getElementById('typingIndicator');
          if (ti) { ti.style.display = 'block'; setTimeout(() => ti.style.display = 'none', 3000); }
        }
      });
    }
  } catch (err) {
    console.error('[Support] Init error:', err);
  }
}

function renderChatMessages(messages) {
  const container = document.getElementById('chatMessages');
  if (!messages || messages.length === 0) {
    container.innerHTML = `<div style="text-align:center;color:var(--muted);padding:40px;">
      <div style="font-size:24px;margin-bottom:8px;">👋</div>
      <div>Welcome! How can we help you today?</div>
      <div style="font-size:12px;margin-top:4px;">Send a message to start the conversation.</div>
    </div>`;
    return;
  }
  container.innerHTML = messages.map(m => chatBubbleHTML(m)).join('');
  container.scrollTop = container.scrollHeight;
}

function chatBubbleHTML(m) {
  const isCustomer = m.sender_type === 'customer';
  const align = isCustomer ? 'flex-end' : 'flex-start';
  const bg = isCustomer ? 'var(--gold)' : 'var(--card-bg)';
  const color = isCustomer ? '#000' : 'var(--text)';
  const border = isCustomer ? 'none' : '1px solid var(--border)';
  const time = m.created_at ? new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
  return `<div style="display:flex;flex-direction:column;align-items:${align};">
    <div style="max-width:75%;padding:10px 16px;border-radius:16px;background:${bg};color:${color};border:${border};font-size:14px;line-height:1.5;">
      ${m.message}
    </div>
    <div style="font-size:10px;color:var(--muted);margin-top:2px;padding:0 8px;">${time}</div>
  </div>`;
}

function appendChatMessage(m) {
  const container = document.getElementById('chatMessages');
  // Remove welcome message if present
  const welcome = container.querySelector('div[style*="text-align:center"]');
  if (welcome && welcome.textContent.includes('Welcome')) welcome.remove();
  container.insertAdjacentHTML('beforeend', chatBubbleHTML(m));
  container.scrollTop = container.scrollHeight;
}

async function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  if (!message || !currentConvId) return;

  const token = sessionStorage.getItem('lf_token');
  if (!token) { input.focus(); return; }

  // Optimistic UI: show the message immediately so the customer sees their
  // own typing without waiting for the round-trip. The server response
  // becomes the source of truth on the next poll.
  appendChatMessage({
    message: message,
    sender_type: 'customer',
    created_at: new Date().toISOString()
  });
  input.value = '';
  input.focus();

  // Persist via REST. The dashboard page does NOT load socket.io, so the
  // earlier WebSocket emit silently no-op'd and messages were lost. REST is
  // simpler and reliable; we poll for new replies below.
  try {
    await fetch('/api/support/conversations/' + currentConvId + '/messages', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: message })
    });
  } catch (e) {
    console.error('[Support] sendChatMessage error:', e);
  }
}

// Poll for new agent replies every 5 seconds while the support view is open.
let _supportPollTimer = null;
let _supportLastMsgCount = 0;

function startSupportPolling() {
  stopSupportPolling();
  _supportPollTimer = setInterval(async () => {
    if (!currentConvId) return;
    const token = sessionStorage.getItem('lf_token');
    if (!token) return;
    try {
      const resp = await fetch('/api/support/conversations/' + currentConvId + '/messages', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const messages = await resp.json();
      if (Array.isArray(messages) && messages.length !== _supportLastMsgCount) {
        renderChatMessages(messages);
        _supportLastMsgCount = messages.length;
      }
    } catch (e) {}
  }, 5000);
}

function stopSupportPolling() {
  if (_supportPollTimer) { clearInterval(_supportPollTimer); _supportPollTimer = null; }
}

// ── FAQ View ──
async function showFAQView() {
  const mainContent = document.getElementById('main-content');
  mainContent.innerHTML = `
  <div class="welcome-header animate-in"><div>
    <div class="welcome-name" style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;">
      Frequently Asked <em style="color:var(--gold);font-style:italic;">Questions</em>
    </div>
  </div></div>
  <div style="margin:20px 0;">
    <input type="text" id="faqSearch" placeholder="Search questions..."
      oninput="filterFAQ(this.value)"
      style="width:100%;max-width:500px;padding:12px 20px;border-radius:25px;border:1px solid var(--border);background:var(--card-bg);color:var(--text);font-size:14px;outline:none;">
  </div>
  <div id="faqContainer" style="display:flex;flex-direction:column;gap:16px;">
    <div style="text-align:center;color:var(--muted);padding:40px;">Loading FAQ...</div>
  </div>`;

  try {
    const resp = await fetch('/api/support/faq');
    const faqData = await resp.json();
    renderFAQ(faqData);
  } catch (err) {
    document.getElementById('faqContainer').innerHTML = '<div style="color:var(--red);padding:20px;">Failed to load FAQ</div>';
  }
}

let allFaqData = {};

function renderFAQ(data) {
  allFaqData = data;
  const container = document.getElementById('faqContainer');
  const categories = Object.keys(data);

  if (categories.length === 0) {
    container.innerHTML = '<div style="color:var(--muted);padding:20px;">No FAQ entries yet.</div>';
    return;
  }

  container.innerHTML = categories.map(cat => `
    <div class="faq-category" data-category="${cat}">
      <div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--gold);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);">${cat}</div>
      ${data[cat].map(q => `
        <div class="faq-item" style="margin-bottom:8px;">
          <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='block'?'none':'block';this.querySelector('span').textContent=this.nextElementSibling.style.display==='block'?'−':'+';"
            style="padding:12px 16px;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;color:var(--text);font-size:14px;">
            ${q.question}
            <span style="color:var(--gold);font-size:18px;font-weight:bold;min-width:20px;text-align:center;">+</span>
          </div>
          <div style="display:none;padding:12px 16px;color:var(--muted);font-size:13px;line-height:1.6;border-left:2px solid var(--gold);margin-left:16px;margin-top:4px;">
            ${q.answer}
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function filterFAQ(query) {
  if (!query) { renderFAQ(allFaqData); return; }
  query = query.toLowerCase();
  const filtered = {};
  for (const cat in allFaqData) {
    const matches = allFaqData[cat].filter(q =>
      q.question.toLowerCase().includes(query) || q.answer.toLowerCase().includes(query)
    );
    if (matches.length > 0) filtered[cat] = matches;
  }
  renderFAQ(filtered);
}

</script>


<!-- ═══════ STAR CANVAS — drifting golden particles ═══════ -->
<script>
(function() {
  const canvas = document.getElementById('starCanvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resizeCanvas(){ canvas.width=innerWidth; canvas.height=innerHeight; }

  function createStars(){
    stars=[];
    for(let i=0;i<200;i++){
      stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*1.5+0.3,
        o: Math.random()*0.6+0.1,
        speed: Math.random()*0.3+0.05,
        phase: Math.random()*Math.PI*2,
        vx: (Math.random()-0.5)*0.15,
        vy: -0.05 - Math.random()*0.15,
        wobbleAmp: 0.2 + Math.random()*0.4,
        wobbleSpeed: 0.002 + Math.random()*0.003,
        glowSize: 2 + Math.random()*4,
        h: 34 + Math.random()*16,
        s: 75 + Math.random()*20,
        l: 52 + Math.random()*30
      });
    }
  }

  function drawStars(t){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{
      s.x += s.vx + Math.sin(t * s.wobbleSpeed + s.phase) * s.wobbleAmp * 0.1;
      s.y += s.vy;
      if(s.y < -10) { s.y = canvas.height + 10; s.x = Math.random()*canvas.width; }
      if(s.x < -10) s.x = canvas.width + 10;
      if(s.x > canvas.width+10) s.x = -10;
      const opacity = s.o * (0.5 + 0.5*Math.sin(t*s.speed + s.phase));
      ctx.save();
      ctx.globalAlpha = opacity * 0.3;
      ctx.shadowColor = 'hsla(' + s.h + ',' + s.s + '%,' + s.l + '%,0.6)';
      ctx.shadowBlur = s.glowSize;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 1.5, 0, Math.PI*2);
      ctx.fillStyle = 'hsla(' + s.h + ',' + s.s + '%,' + s.l + '%,' + opacity + ')';
      ctx.fill();
      ctx.restore();
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(212,168,67,' + opacity + ')';
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  resizeCanvas(); createStars();
  requestAnimationFrame(drawStars);
  addEventListener('resize',()=>{resizeCanvas();createStars();});
})();
</script>
